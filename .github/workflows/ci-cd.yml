name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Use PAT instead of password

      - name: Build Docker Image
        run: |
          docker build -t obidocker10/myapp-new .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push obidocker10/myapp-new

  unit-tests:
    runs-on: self-hosted
    needs: docker-build-push
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          # Replace with your actual test command, e.g.:
          # pytest tests/

  code-quality-scan:
    runs-on: self-hosted
    needs: unit-tests
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Uncomment to enforce Quality Gate
      # - uses: sonarsource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  k8s-deploy:
    runs-on: self-hosted
    needs: code-quality-scan
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Kubernetes CLI
        run: |
          kubectl cluster-info

      - name: Deploy to Minikube
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/myapp

  resource-cleanup:
    runs-on: self-hosted
    needs: k8s-deploy
    if: success()
    steps:
      - name: Clean Up Docker Resources
        run: |
          docker system prune -af
